<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taskify - Glass Theme</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-image: url('https://images.unsplash.com/photo-1458682625221-3a45f8a844c7?q=80&w=1374&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        .glass-panel, .glass-menu, .glass-input {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.7);
        }

        .glass-menu { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(20px); }

        .glass-input:focus {
            background: rgba(255, 255, 255, 0.7);
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .task-card:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.6);
        }
    </style>
</head>
<body class="text-zinc-900 min-h-screen">

    <!-- AUTH SCREEN -->
    <div id="authScreen" class="fixed inset-0 flex items-center justify-center bg-black/40 backdrop-blur-sm z-[200]">
        <div class="glass-menu rounded-3xl w-full max-w-xs p-8 text-center">
            <div class="w-20 h-20 bg-blue-600 rounded-3xl mx-auto flex items-center justify-center text-white text-5xl font-bold mb-6">T</div>
            <h1 class="text-3xl font-semibold tracking-tight mb-1">Taskify</h1>
            <p id="authTitle" class="text-zinc-500 mb-8">Sign in to continue</p>

            <input id="username" type="text" placeholder="Username" class="glass-input w-full rounded-3xl px-5 py-4 mb-3 text-center text-lg">
            <input id="password" type="password" placeholder="Password" class="glass-input w-full rounded-3xl px-5 py-4 mb-6 text-center text-lg">

            <button onclick="handleAuth()" id="authButton" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-3xl font-medium text-lg transition-colors">
                Sign In
            </button>

            <p id="toggleText" onclick="toggleAuthMode()" class="text-sm text-zinc-500 mt-6 cursor-pointer hover:text-zinc-700">
                Don't have an account? <span class="text-blue-600 font-medium">Sign Up</span>
            </p>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="mainApp" class="hidden min-h-screen">

        <header class="glass-menu rounded-3xl mt-2 mx-4 h-16 px-4 flex items-center justify-between sticky top-2 z-50">
            <div class="flex items-center gap-4">
                <button onclick="toggleDropdown()" class="p-3 text-zinc-700 hover:bg-white/50 rounded-3xl transition-colors">
                    <i class="fa-solid fa-bars text-2xl"></i>
                </button>
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-blue-600 rounded-3xl flex items-center justify-center text-white font-bold text-xl">T</div>
                    <span class="font-semibold text-2xl tracking-tight">Taskify</span>
                </div>
            </div>

            <div onclick="logout()" class="flex items-center gap-3 cursor-pointer hover:bg-white/30 p-2 rounded-3xl transition-colors">
                <div class="text-right">
                    <div id="userName" class="text-sm font-medium"></div>
                </div>
                <div id="userAvatar" class="w-8 h-8 bg-zinc-800 text-white rounded-3xl flex items-center justify-center font-bold text-sm"></div>
            </div>
        </header>

        <!-- Dropdown Menu -->
        <div id="dropdownMenu" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm z-[100] flex items-center justify-center">
            <div onclick="event.stopImmediatePropagation()" class="dropdown-menu glass-menu rounded-3xl w-full max-w-xs mx-4 overflow-hidden">
                <div class="px-5 pt-5 pb-3 border-b border-white/50 flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 bg-blue-600 rounded-3xl flex items-center justify-center text-white font-bold text-xl">T</div>
                        <span class="font-semibold text-xl tracking-tight">Taskify</span>
                    </div>
                    <button onclick="toggleDropdown()" class="text-zinc-500 hover:text-zinc-800">
                        <i class="fa-solid fa-xmark text-2xl"></i>
                    </button>
                </div>

                <div class="p-2">
                    <button onclick="showAddModal()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3.5 px-5 rounded-3xl flex items-center justify-center gap-2 mb-4 transition-colors">
                        <i class="fa-solid fa-plus"></i> New Task
                    </button>

                    <div class="space-y-1 px-1">
                        <div onclick="selectFilter('all')" class="flex items-center gap-3 px-5 py-3.5 rounded-3xl cursor-pointer hover:bg-white/60 transition-colors">
                            <i class="fa-solid fa-inbox w-5"></i><span class="font-medium">All Tasks</span>
                        </div>
                        <div onclick="selectFilter('active')" class="flex items-center gap-3 px-5 py-3.5 rounded-3xl cursor-pointer hover:bg-white/60 transition-colors">
                            <i class="fa-solid fa-clock w-5"></i><span class="font-medium">Active</span>
                        </div>
                        <div onclick="selectFilter('completed')" class="flex items-center gap-3 px-5 py-3.5 rounded-3xl cursor-pointer hover:bg-white/60 transition-colors">
                            <i class="fa-solid fa-check-circle w-5"></i><span class="font-medium">Completed</span>
                        </div>
                        <div onclick="logout()" class="flex items-center gap-3 px-5 py-3.5 rounded-3xl cursor-pointer hover:bg-red-100 text-red-600 transition-colors">
                            <i class="fa-solid fa-right-from-bracket w-5"></i><span class="font-medium">Logout</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="flex-1 p-4 overflow-auto">
            <div class="max-w-4xl mx-auto">
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8">
                    <div class="glass-panel rounded-3xl p-5">
                        <div class="text-xs text-zinc-600 font-semibold uppercase">Total</div>
                        <div id="totalTasks" class="text-3xl font-semibold mt-1"></div>
                    </div>
                    <div class="glass-panel rounded-3xl p-5">
                        <div class="text-xs text-zinc-600 font-semibold uppercase">Completed</div>
                        <div id="completedTasks" class="text-3xl font-semibold mt-1 text-emerald-700"></div>
                    </div>
                    <div class="glass-panel rounded-3xl p-5">
                        <div class="text-xs text-zinc-600 font-semibold uppercase">Pending</div>
                        <div id="pendingTasks" class="text-3xl font-semibold mt-1 text-blue-700"></div>
                    </div>
                </div>

                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6 glass-panel p-4 rounded-3xl">
                    <h1 id="viewTitle" class="text-2xl font-semibold px-2">All Tasks</h1>
                    <select id="priorityFilter" onchange="filterTasks()" class="glass-input rounded-3xl px-5 py-2 text-sm w-full sm:w-auto font-medium cursor-pointer">
                        <option value="">All Priorities</option>
                        <option value="high">High</option>
                        <option value="medium">Medium</option>
                        <option value="low">Low</option>
                    </select>
                </div>

                <div id="taskList" class="space-y-3"></div>
            </div>
        </div>

        <!-- Task Modal -->
        <div id="taskModal" class="fixed inset-0 bg-zinc-900/40 backdrop-blur-sm hidden flex items-center justify-center z-[110] p-4">
            <div class="glass-menu rounded-3xl w-full max-w-md shadow-2xl">
                <div class="p-6">
                    <div class="flex justify-between items-center mb-6">
                        <h2 id="modalTitle" class="text-2xl font-semibold">New Task</h2>
                        <button onclick="hideModal()" class="text-zinc-500 hover:text-zinc-800">
                            <i class="fa-solid fa-xmark text-2xl"></i>
                        </button>
                    </div>

                    <form id="taskForm" onsubmit="saveTask(event)">
                        <input type="hidden" id="editId">
                        <div class="space-y-5">
                            <div>
                                <label class="text-sm font-medium text-zinc-800 block mb-1">Title</label>
                                <input id="taskTitle" type="text" required class="glass-input w-full rounded-3xl px-5 py-3.5 text-zinc-900">
                            </div>
                            <div>
                                <label class="text-sm font-medium text-zinc-800 block mb-1">Description</label>
                                <textarea id="taskDesc" rows="3" class="glass-input w-full rounded-3xl px-5 py-3.5 resize-none text-zinc-900"></textarea>
                            </div>
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <div>
                                    <label class="text-sm font-medium text-zinc-800 block mb-1">Due Date</label>
                                    <input id="taskDue" type="date" required class="glass-input w-full rounded-3xl px-5 py-3.5 text-zinc-900">
                                </div>
                                <div>
                                    <label class="text-sm font-medium text-zinc-800 block mb-1">Priority</label>
                                    <select id="taskPriority" class="glass-input w-full rounded-3xl px-5 py-3.5 text-zinc-900">
                                        <option value="low">Low</option>
                                        <option value="medium" selected>Medium</option>
                                        <option value="high">High</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="flex flex-col sm:flex-row gap-3 mt-8">
                            <button type="button" onclick="hideModal()" class="flex-1 py-4 glass-input rounded-3xl font-medium hover:bg-white/60">Cancel</button>
                            <button type="submit" class="flex-1 py-4 bg-blue-600 text-white rounded-3xl font-medium hover:bg-blue-700">Save Task</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentUser = null;
        let tasks = [];
        let currentFilter = 'all';
        let currentEditId = null;
        let isLoginMode = true;

        // ====================== AUTH ======================
        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('authTitle').textContent = isLoginMode ? "Sign in to continue" : "Create new account";
            document.getElementById('authButton').textContent = isLoginMode ? "Sign In" : "Sign Up";
            document.getElementById('toggleText').innerHTML = isLoginMode 
                ? `Don't have an account? <span class="text-blue-600 font-medium">Sign Up</span>`
                : `Already have an account? <span class="text-blue-600 font-medium">Sign In</span>`;
        }

        function handleAuth() {
            const username = document.getElementById('username').value.trim().toLowerCase();
            const password = document.getElementById('password').value.trim();

            if (!username || !password) {
                alert("Username and password are required");
                return;
            }

            let users = JSON.parse(localStorage.getItem('taskify_users')) || {};

            if (isLoginMode) {
                // LOGIN
                if (users[username] && users[username].password === password) {
                    currentUser = username;
                    loadUserData();
                    showMainApp();
                } else {
                    alert("Invalid username or password");
                }
            } else {
                // SIGN UP - Start with empty tasks
                if (users[username]) {
                    alert("Username already taken");
                } else {
                    users[username] = { password };
                    localStorage.setItem('taskify_users', JSON.stringify(users));
                    currentUser = username;
                    tasks = [];                    // Empty tasks for new user
                    saveUserTasks();
                    showMainApp();
                }
            }
        }

        function showMainApp() {
            document.getElementById('authScreen').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            
            document.getElementById('userName').textContent = currentUser.toUpperCase();
            document.getElementById('userAvatar').textContent = currentUser[0].toUpperCase();
        }

        function logout() {
            if (confirm("Logout?")) {
                currentUser = null;
                document.getElementById('authScreen').classList.remove('hidden');
                document.getElementById('mainApp').classList.add('hidden');
                document.getElementById('username').value = '';
                document.getElementById('password').value = '';
            }
        }

        // ====================== TASK MANAGEMENT ======================
        function loadUserData() {
            const key = `tasks_${currentUser}`;
            const saved = JSON.parse(localStorage.getItem(key)) || [];
            tasks = saved;
            renderTasks(getFilteredTasks());
        }

        function saveUserTasks() {
            localStorage.setItem(`tasks_${currentUser}`, JSON.stringify(tasks));
        }

        function renderTasks(filteredTasks) {
            const container = document.getElementById('taskList');
            container.innerHTML = '';

            if (filteredTasks.length === 0) {
                container.innerHTML = `
                    <div class="glass-panel rounded-3xl p-12 text-center">
                        <i class="fa-solid fa-clipboard-list text-5xl text-zinc-300 mb-4"></i>
                        <p class="text-zinc-500">No tasks yet</p>
                    </div>`;
                updateStats();
                return;
            }

            filteredTasks.forEach(task => {
                const due = new Date(task.due);
                const isOverdue = due < new Date() && !task.completed;
                container.innerHTML += `
                    <div class="task-card glass-panel rounded-3xl p-5 flex items-start gap-4 group">
                        <button onclick="toggleComplete(${task.id}); event.stopImmediatePropagation()" class="mt-1 w-6 h-6 rounded-2xl border-2 flex items-center justify-center flex-shrink-0 transition-colors ${task.completed ? 'bg-emerald-500 border-emerald-500 text-white' : 'bg-white/60 border-zinc-400 hover:border-blue-500 text-transparent'}">
                            ${task.completed ? '✓' : ''}
                        </button>
                        <div class="flex-1 min-w-0">
                            <div class="flex justify-between items-start">
                                <h3 onclick="editTask(${task.id})" class="font-medium text-base cursor-pointer pr-4 ${task.completed ? 'line-through text-zinc-500' : 'text-zinc-900'}">
                                    ${task.title}
                                </h3>
                                <span class="text-xs px-4 py-1 rounded-3xl font-semibold whitespace-nowrap bg-white/70 ${task.priority === 'high' ? 'text-red-700' : task.priority === 'medium' ? 'text-amber-700' : 'text-blue-700'}">
                                    ${task.priority}
                                </span>
                            </div>
                            ${task.description ? `<p class="text-zinc-700 text-sm mt-1.5 line-clamp-2">${task.description}</p>` : ''}
                            <div class="flex items-center gap-4 mt-4 text-sm font-medium">
                                <div class="flex items-center gap-1.5 ${isOverdue ? 'text-red-600' : 'text-zinc-700'}">
                                    <i class="fa-solid fa-calendar-days"></i>
                                    <span>${due.toLocaleDateString('en-US', {month:'short', day:'numeric'})}</span>
                                </div>
                                <span class="text-xs uppercase tracking-widest ${task.completed ? 'text-emerald-700' : 'text-blue-700'}">
                                    ${task.completed ? '✓ Done' : 'Active'}
                                </span>
                            </div>
                        </div>
                        <button onclick="deleteTask(${task.id}); event.stopImmediatePropagation()" class="opacity-100 sm:opacity-0 sm:group-hover:opacity-100 text-zinc-500 hover:text-red-600 p-2 transition-opacity">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </div>
                `;
            });
            updateStats();
        }

        function updateStats() {
            const total = tasks.length;
            const completed = tasks.filter(t => t.completed).length;
            document.getElementById('totalTasks').textContent = total;
            document.getElementById('completedTasks').textContent = completed;
            document.getElementById('pendingTasks').textContent = total - completed;
        }

        function saveTask(e) {
            e.preventDefault();
            const title = document.getElementById('taskTitle').value.trim();
            const desc = document.getElementById('taskDesc').value.trim();
            const due = document.getElementById('taskDue').value;
            const priority = document.getElementById('taskPriority').value;

            if (!title || !due) return;

            if (currentEditId) {
                const task = tasks.find(t => t.id === currentEditId);
                if (task) {
                    task.title = title;
                    task.description = desc;
                    task.due = due;
                    task.priority = priority;
                }
            } else {
                tasks.push({ id: Date.now(), title, description: desc, due, priority, completed: false });
            }

            saveUserTasks();
            hideModal();
            renderTasks(getFilteredTasks());
        }

        function toggleComplete(id) {
            const task = tasks.find(t => t.id === id);
            if (task) task.completed = !task.completed;
            saveUserTasks();
            renderTasks(getFilteredTasks());
        }

        function deleteTask(id) {
            if (confirm("Delete this task?")) {
                tasks = tasks.filter(t => t.id !== id);
                saveUserTasks();
                renderTasks(getFilteredTasks());
            }
        }

        function editTask(id) {
            const task = tasks.find(t => t.id === id);
            if (!task) return;
            currentEditId = id;
            document.getElementById('modalTitle').textContent = 'Edit Task';
            document.getElementById('taskTitle').value = task.title;
            document.getElementById('taskDesc').value = task.description || '';
            document.getElementById('taskDue').value = task.due;
            document.getElementById('taskPriority').value = task.priority;
            document.getElementById('taskModal').classList.remove('hidden');
            document.getElementById('taskModal').classList.add('flex');
        }

        function showAddModal() {
            currentEditId = null;
            document.getElementById('modalTitle').textContent = 'New Task';
            document.getElementById('taskForm').reset();
            document.getElementById('taskDue').valueAsDate = new Date();
            document.getElementById('dropdownMenu').classList.add('hidden');
            document.getElementById('taskModal').classList.remove('hidden');
            document.getElementById('taskModal').classList.add('flex');
        }

        function hideModal() {
            const modal = document.getElementById('taskModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        function getFilteredTasks() {
            let filtered = tasks.filter(task => {
                if (currentFilter === 'active') return !task.completed;
                if (currentFilter === 'completed') return task.completed;
                return true;
            });

            const priority = document.getElementById('priorityFilter').value;
            if (priority) filtered = filtered.filter(t => t.priority === priority);

            return filtered.sort((a, b) => new Date(a.due) - new Date(b.due));
        }

        function filterTasks() { renderTasks(getFilteredTasks()); }

        function selectFilter(filter) {
            currentFilter = filter;
            document.getElementById('dropdownMenu').classList.add('hidden');
            renderTasks(getFilteredTasks());
            const titles = { all: 'All Tasks', active: 'Active Tasks', completed: 'Completed Tasks' };
            document.getElementById('viewTitle').textContent = titles[filter] || 'All Tasks';
        }

        function toggleDropdown() { 
            document.getElementById('dropdownMenu').classList.toggle('hidden'); 
        }

        window.onload = () => {};
    </script>
</body>
</html>
